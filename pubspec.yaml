name: flutter_file_explorer
description: "Embedded Windows-Explorer-style file picker for Flutter desktop apps. Save, open, multi-select and directory pick — all rendered inside your app."
version: 0.2.0

topics:
  - file-picker
  - file-explorer
  - file-dialog
  - desktop
  - picker

environment:
  sdk: ^3.8.1
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  file_icon: ^1.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  desktop_drop: ^0.7.1
  shared_preferences: ^2.5.5
  ffi: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
